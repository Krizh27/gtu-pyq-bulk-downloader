<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTU Speedrun Archive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Video Reel -->
    <video autoplay loop muted playsinline id="bgReel" class="bg-reel"></video>
    <div class="bg-overlay"></div>

    <!-- Rotating Meme Banner -->
    <div class="banner-container">
        <marquee id="memeBanner" class="meme-banner" scrollamount="6">Loading wisdom...</marquee>
    </div>

    <!-- Main Glassmorphic Container -->
    <div class="glass-container">
        
        <!-- Header -->
        <header class="app-header">
            <h1>GTU <span class="highlight">SPEEDRUN</span></h1>
            <p>Previous Year Question Paper Archive</p>
        </header>

        <!-- Panic Meter -->
        <div id="panicMeter" class="panic-widget">
            <div id="panicLabel" class="panic-label">Loading Status...</div>
            <div id="panicMessage" class="panic-message">Checking dates...</div>
        </div>

        <!-- Global Paper Media (shows below panic meter) -->
        <div id="paperMediaDisplay" class="paper-media-display hidden"></div>

        <main>
            <!-- Search Form -->
            <section class="glass-card">
                <form id="pyqForm">
                    <div class="form-group">
                        <label for="subjectCode">Subject Code</label>
                        <input type="text" id="subjectCode" class="glass-input" placeholder="e.g. 3150703" required minlength="4" maxlength="15" autocomplete="off">
                        <!-- Subject Specific Meme Box -->
                        <div id="subjectMemeBox" class="subject-meme hidden"></div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="course">Course</label>
                            <select id="course" class="glass-input" required>
                                <option value="BE">BE</option>
                                <option value="ME">ME</option>
                                <option value="BCA">BCA</option>
                                <option value="MCA">MCA</option>
                                <option value="Diploma">Diploma</option>
                                <option value="B.Pharm">B.Pharm</option>
                                <option value="MBA">MBA</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startYear">From Year</label>
                            <select id="startYear" class="glass-input" required></select>
                        </div>
                        <div class="form-group">
                            <label for="endYear">To Year</label>
                            <select id="endYear" class="glass-input" required></select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Session</label>
                        <div class="button-group" id="sessionGroup">
                            <button type="button" class="glass-btn toggle-btn" data-value="S">Summer</button>
                            <button type="button" class="glass-btn toggle-btn" data-value="W">Winter</button>
                            <button type="button" class="glass-btn toggle-btn active" data-value="SW">Both</button>
                        </div>
                        <input type="hidden" id="sessionMode" value="SW">
                    </div>

                    <small class="error-msg hidden" id="yearError"></small>

                    <button type="submit" id="submitBtn" class="primary-btn">
                        Find Papers
                    </button>
                </form>
            </section>

            <!-- Results Section -->
            <section id="resultsSection" class="glass-card hidden mt-1">
                <div class="results-header">
                    <h3 id="resultSummary">Papers Found: 0</h3>
                </div>
                
                <div id="corsWarning" class="warning-box hidden">
                    <strong>CORS Blocked.</strong> GTU server rejected the auto-download. Click the links below manually.
                </div>

                <div class="paper-list-container">
                    <ul id="paperList" class="paper-list">
                        <!-- List injected here -->
                    </ul>
                </div>

                <div class="action-row mt-1" id="downloadRow">
                    <button id="downloadBtn" class="primary-btn">
                        Download All (ZIP)
                    </button>
                </div>
                
                <!-- Download Success Message (Meme) -->
                <div id="downloadMemeBox" class="success-meme hidden mt-1"></div>
            </section>
        </main>
    </div>

    <!-- Load the Config FIRST -->
    <script src="config/content.js"></script>
    <!-- Load the Logic SECOND -->
    <script src="app.js"></script>
</body>
</html>
